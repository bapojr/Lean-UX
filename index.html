<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paperpal AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=IBM+Plex+Sans:wght@500&family=IBM+Plex+Serif:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="phone-frame">
        <header class="topbar">
          <div class="brand-mark" aria-hidden="true">

                </g>
                <path opacity="0.35" fill-rule="evenodd" clip-rule="evenodd" d="M8.05859 0L16.1155 8.05686H9.40241C8.66033 8.05686 8.05985 7.45512 8.05985 6.7143V0.00126353L8.05859 0Z" fill="white"/>
                <path d="M2.87254 13.4223C3.23031 13.0923 3.81059 13.0923 4.16837 13.4223C6.34031 15.4261 9.86243 15.4261 12.0344 13.4223C12.3922 13.0923 12.9724 13.0923 13.3302 13.4223C13.688 13.7522 13.688 14.287 13.3302 14.617C10.4427 17.2807 5.76129 17.2807 2.8738 14.617C2.51603 14.287 2.51603 13.7522 2.8738 13.4223H2.87254Z" fill="white"/>

              <defs>
                <linearGradient id="paint0_linear_498_13947" x1="4.00126" y1="10.6637" x2="7.79606" y2="20.0558" gradientUnits="userSpaceOnUse">
                  <stop stop-opacity="0"/>
                  <stop offset="1"/>
                </linearGradient>
                <linearGradient id="paint1_linear_498_13947" x1="8.00927" y1="5.00253" x2="16.1408" y2="5.00253" gradientUnits="userSpaceOnUse">
                  <stop stop-opacity="0"/>
                  <stop offset="1"/>
                </linearGradient>
                <linearGradient id="paint2_linear_498_13947" x1="-0.00252844" y1="3.99747" x2="8.0076" y2="3.99747" gradientUnits="userSpaceOnUse">
                  <stop stop-opacity="0"/>
                  <stop offset="1"/>
                </linearGradient>
                <clipPath id="clip0_498_13947">
                  <rect width="16" height="24" fill="white"/>
                </clipPath>
              </defs>
            </svg>
          </div>
          <button class="icon-button" aria-label="Open sidebar">
            <span class="icon">☰</span>
          </button>
        </header>

        <section class="hero">
          <h1 id="greeting">Good day, Sushrut</h1>
        </section>

        <nav class="tab-strip" aria-label="Assistant features">
          <button class="tab-button active" data-tab="chat" type="button">AI Chat</button>
          <button class="tab-button" data-tab="checks" type="button">AI Checks</button>
          <button class="tab-button" data-tab="illustrate" type="button">AI Illustrate</button>
          <button class="tab-button" data-tab="more" type="button">More ▾</button>
        </nav>

        <section class="chat-card">
          <label class="sr-only" for="prompt-input">Ask Paperpal</label>
          <div class="input-wrap" id="input-focus-target">
            <textarea
              id="prompt-input"
              rows="3"
              placeholder="How can I help you today?"
            ></textarea>
            <div class="input-toolbar">
              <button class="toolbar-icon" type="button" aria-label="Add attachment">+</button>
              <div class="illustrate-tools" id="illustrate-tools" aria-hidden="true">
                <button class="illustrate-tool text-tool" type="button" aria-label="Aspect ratio">4:3</button>
                <button class="illustrate-tool icon-tool" type="button" aria-label="Document option">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M4 1.5H7.5V4.25C7.5 5.49375 8.50625 6.5 9.75 6.5H12.5V14C12.5 14.275 12.275 14.5 12 14.5H4C3.725 14.5 3.5 14.275 3.5 14V2C3.5 1.725 3.725 1.5 4 1.5ZM9 2.12188L11.8781 5H9.75C9.33437 5 9 4.66563 9 4.25V2.12188ZM4 0C2.89688 0 2 0.896875 2 2V14C2 15.1031 2.89688 16 4 16H12C13.1031 16 14 15.1031 14 14V5.82812C14 5.29688 13.7906 4.7875 13.4156 4.4125L9.58437 0.584375C9.20937 0.209375 8.70312 0 8.17188 0H4ZM5.75 8C5.33437 8 5 8.33438 5 8.75C5 9.16562 5.33437 9.5 5.75 9.5H10.25C10.6656 9.5 11 9.16562 11 8.75C11 8.33438 10.6656 8 10.25 8H5.75ZM5.75 11C5.33437 11 5 11.3344 5 11.75C5 12.1656 5.33437 12.5 5.75 12.5H10.25C10.6656 12.5 11 12.1656 11 11.75C11 11.3344 10.6656 11 10.25 11H5.75Z" fill="black"/>
                  </svg>
                </button>
                <button class="illustrate-tool icon-tool" type="button" aria-label="3D option">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <g clip-path="url(#clip0_452_12076)">
                      <path d="M7.76954 1.49963C7.91935 1.41273 8.09912 1.41273 8.24894 1.49963L13.037 4.26517L8.00924 7.16854L2.98152 4.26517L7.76954 1.49963ZM2.26242 5.51161L7.29014 8.41498V14.2217L2.50212 11.4562C2.35231 11.3693 2.26242 11.2135 2.26242 11.0397V5.50861V5.51161ZM8.72834 14.2217V8.41498L13.7561 5.51161V11.0427C13.7561 11.2135 13.6662 11.3723 13.5164 11.4592L8.72834 14.2217ZM8.96804 0.25618C8.37478 -0.0853933 7.64369 -0.0853933 7.05044 0.25618L1.78302 3.29438C1.18976 3.63596 0.824219 4.27116 0.824219 4.95431V11.0367C0.824219 11.7228 1.18976 12.3551 1.78302 12.6966L7.05044 15.7438C7.64369 16.0854 8.37478 16.0854 8.96804 15.7438L14.2385 12.7026C14.8317 12.361 15.1973 11.7258 15.1973 11.0427V4.9603C15.1973 4.27416 14.8317 3.64195 14.2385 3.30037L8.96804 0.253184V0.25618Z" fill="black"/>
                    </g>
                    <defs>
                      <clipPath id="clip0_452_12076">
                        <rect width="16" height="16" fill="white"/>
                      </clipPath>
                    </defs>
                  </svg>
                </button>
              </div>
              <button class="send-cta" id="send-cta" type="button" aria-label="Send prompt">
                <svg xmlns="http://www.w3.org/2000/svg" width="17" height="13" viewBox="0 0 17 13" fill="none">
                  <path d="M15.4064 0.764871C15.4064 0.341006 15.7616 0 16.2032 0C16.6447 0 17 0.341006 17 0.764871V6.11897C17 7.6678 15.6919 8.92349 14.0784 8.92349H2.72072L5.6091 11.6961C5.92119 11.9957 5.92119 12.4802 5.6091 12.7766C5.29701 13.0729 4.79242 13.0761 4.48364 12.7766L0.23406 8.70044C-0.0780201 8.40085 -0.0780201 7.91639 0.23406 7.61999L4.48364 3.5375C4.79573 3.23799 5.30033 3.23799 5.6091 3.5375C5.91787 3.83708 5.92119 4.32154 5.6091 4.61794L2.72072 7.39057H14.0784C14.8121 7.39057 15.4064 6.82012 15.4064 6.11578V0.764871Z" fill="white"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="checks-upload-card hidden" id="checks-upload-card" aria-hidden="true">
            <p class="upload-copy">Drag and drop or upload .docx files up to 25MB</p>
            <button class="upload-cta" type="button">Upload file</button>
          </div>
        </section>

        <section class="tab-panels">
          <div class="panel-view active" data-panel="chat">
            <div class="pill-row horizontal-scroll single-select" id="chat-pills"></div>
          </div>

          <div class="panel-view" data-panel="checks">
            <div class="pill-row multi-select" id="checks-pills"></div>
            <button class="primary-cta" id="checks-cta" type="button">Run Selected Checks</button>
            <p class="tooltip-note hidden" id="checks-note">Select at least one check to continue</p>
          </div>

          <div class="panel-view" data-panel="illustrate">
            <div class="pill-row horizontal-scroll single-select" id="illustrate-pills"></div>
          </div>

          <section class="suggestion-card hidden" id="inline-suggestion-card" aria-hidden="true">
            <div class="suggestion-card-header">
              <p class="suggestion-card-title" id="inline-suggestion-title">Suggestions</p>
              <button class="suggestion-card-close" id="inline-suggestion-close" type="button" aria-label="Close suggestions">×</button>
            </div>
            <div class="suggestion-card-list" id="inline-suggestion-list"></div>
          </section>
        </section>
      </main>
    </div>

    <div class="overlay hidden" id="sheet-overlay"></div>

    <section class="bottom-sheet hidden" id="more-sheet" aria-hidden="true">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h2>More tools</h2>
        <button class="close-button" id="close-more" type="button" aria-label="Close more menu">×</button>
      </div>
    </section>

    <script src="./script.js"></script>
  </body>
</html>
